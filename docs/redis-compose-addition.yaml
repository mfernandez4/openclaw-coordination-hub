# Redis addition for OpenClaw
# Add to compose.override.yaml or create redis.compose.yaml and include it

services:
  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - openclaw-internal

volumes:
  redis-data:
    driver: local

networks:
  openclaw-internal:
    name: openclaw-internal
    external: true
    # If network doesn't exist, create it: docker network create openclaw-internal
