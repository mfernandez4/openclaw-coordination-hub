# Redis addition for OpenClaw
# Add to compose.override.yaml or create redis.compose.yaml and include it

services:
  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - openclaw-internal

volumes:
  redis-data:
    driver: local

networks:
  openclaw-internal:
    name: openclaw-internal
    external: true
    # NOTE: Before running, create the network:
    #   docker network create openclaw-internal
    # If your compose stack uses a different network (e.g. ai-stack_default),
    # either: (a) change openclaw-internal to match your network name, or
    # (b) create the openclaw-internal network as above
